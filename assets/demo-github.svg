<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%">
  <!-- Window Background -->
  <rect width="800" height="500" rx="10" ry="10" fill="#121212" />
  
  <!-- macOS Window Controls -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56" />
  <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="20" r="6" fill="#27c93f" />

  <!-- Window Title -->
  <text x="400" y="24" fill="#888888" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" text-anchor="middle">tardi github auto-synthesis</text>

  <!-- Terminal Content -->
  <g font-family="Menlo, Monaco, Consolas, 'Courier New', monospace" font-size="14">
    <!-- Command -->
    <text x="20" y="60" fill="#00F2FE">$ tardi github https://github.com/Nyx-abu/demo-agent.git</text>
    
    <!-- Output -->
    <text x="20" y="90" fill="#6c757d">📦 Cloning repository into temporary workspace...</text>
    <text x="20" y="115" fill="#6c757d">📦 Detected package.json. Installing dependencies (npm install)...</text>
    <text x="20" y="140" fill="#6c757d">⚙️  Detected startup command: `npm start`</text>
    
    <text x="20" y="180" fill="#ffbd2e">⚠️ No tardi.yaml found in https://github.com/Nyx-abu/demo-agent.git.</text>
    <text x="20" y="205" fill="#ffffff">◆  Would you like to auto-synthesize a gauntlet by running the agent once?</text>
    <text x="20" y="230" fill="#6c757d">◇  <tspan fill="#27c93f">Yes</tspan></text>
    
    <text x="20" y="270" fill="#ffffff">--- Golden Run 1/3 ---</text>
    <text x="20" y="295" fill="#27c93f">✓ Run 1 succeeded! (Lat: 412ms)</text>
    <text x="20" y="320" fill="#ffffff">--- Golden Run 2/3 ---</text>
    <text x="20" y="345" fill="#27c93f">✓ Run 2 succeeded! (Lat: 389ms)</text>
    <text x="20" y="370" fill="#ffffff">--- Golden Run 3/3 ---</text>
    <text x="20" y="395" fill="#27c93f">✓ Run 3 succeeded! (Lat: 405ms)</text>
    
    <text x="20" y="440" fill="#00F2FE">✨ Synthesized 2 assertions (JSON Schema, Runtime Status)</text>
    <text x="20" y="465" fill="#27c93f">🚀 Auto-generated tardi.yaml and launched evaluation suite!</text>
  </g>
</svg>
